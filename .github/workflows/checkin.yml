name: 每日自动签到 - audiences.me

on:
  schedule:
    # 每天 UTC 16:05 执行 = 北京时间 00:05（签到名额刚刷新）
    - cron: '5 16 * * *'
    # 每月 1 日和 20 日 UTC 12:00 触发保活提交（间隔不超过 50 天，GitHub 60 天无活动会暂停）
    - cron: '0 12 1,20 * *'
  workflow_dispatch:

jobs:
  checkin:
    name: 执行签到
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 仅每日签到的 cron 触发，或手动触发时执行
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 16 * * *'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 执行签到
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: python checkin.py

      - name: 上传截图（签到失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3

  keep-alive:
    name: 保持仓库活跃
    runs-on: ubuntu-latest
    # 仅保活 cron 触发时执行
    if: github.event.schedule == '0 12 1,20 * *'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提交保活记录
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "chore: keep alive $(date '+%Y-%m-%d')"
          git push
